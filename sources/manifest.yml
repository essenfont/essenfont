  # this format. The previous file in the repo was an HTML error page
  # (failed download) and has been removed.
  #
  # Re-enable in v0.2.0 after fontisan gains cmap format 13 support.
  # The fallback role (tofu-box glyphs for uncovered codepoints) is
  # currently unfillable.

  # ─────────── Tai Yo (PUA-encoded, needs remap) ───────────
  #
  # Pre-Unicode-17 font used to render the Tai Yo code chart. Glyphs
  # are encoded at non-standard PUA-like positions (U+15250..U+1527F,
  # U+1E600..U+1E7FF). The build must remap via
  # sources/remaps/noto-serif-tai-yo.yml before scanning cmap. Remap
  # derivation in progress (visual-match against the Unicode Tai Yo
  # code chart, U+16E40..U+16E9F). Until remap is derived + build
  # supports codepoint_remap, this donor is disabled (enabled: false).

