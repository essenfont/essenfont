  # ─────────── Emoji (Noto Color Emoji) ───────────
  #
  # Color bitmap emoji via CBDT/CBLC tables. fontisan 0.4+ added
  # single-source CBDT passthrough (REQ-cbdt-cblc-passthrough.md is
  # now implemented). The Stitcher propagates NotoColorEmoji's CBDT
  # and CBLC tables byte-for-byte into the output font. Restricted to
  # a single source — multi-source CBDT merging raises
  # MultipleCbdtSourcesError in fontisan.
  #
  # Excluded from the outline cp_map by OutlinePolicy (see
  # lib/essenfont/outline_policy.rb). The TTC fallback uses noto-emoji
  # below for Emoticons coverage.

