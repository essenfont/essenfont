name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_donors:
        description: 'Skip donor acquisition (use cached references/input-fonts)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write  # required for npm trusted publishing (provenance)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Set up Node (for npm trusted publishing)
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache donor fonts
        id: donor-cache
        uses: actions/cache@v4
        with:
          path: references/input-fonts
          key: donors-${{ hashFiles('sources/manifest.yml') }}

      - name: Cache UFO conversions
        uses: actions/cache@v4
        with:
          path: references/build-cache
          key: ufo-cache-v1-${{ hashFiles('sources/manifest.yml', 'Gemfile.lock') }}
          restore-keys: |
            ufo-cache-v1-

      - name: Acquire donor fonts
        if: ${{ !inputs.skip_donors && steps.donor-cache.outputs.cache-hit != 'true' }}
        run: |
          # ucode is now a regular gem dependency (via Gemfile); its CLI
          # is on PATH after `bundle install`. No more specific_install.
          bundle exec ucode fetch fonts || true
          if [ -d ~/.ucode/fonts ]; then
            cp ~/.ucode/fonts/*.{ttf,otf,ttc} references/input-fonts/ 2>/dev/null || true
          fi

      - name: Run full release pipeline
        run: bundle exec ruby scripts/release.rb

      - name: Generate release notes
        run: |
          {
            echo "## Essenfont ${{ github.ref_name }}"
            echo
            echo "Built via \`scripts/release.rb\`. Artifacts in this release:"
            echo
            cat release/release-manifest.json | jq -r '.artifacts[] | "- `\(.)`"'
            echo
            echo "See TODO.otc-essenfont/ for the full architecture."
          } > release/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/release-notes.md
          files: |
            release/*
            release/npm/*.tgz

      - name: Publish to npm (trusted publishing — best-effort after GH Release ships)
        continue-on-error: true
        run: bundle exec ruby scripts/release.rb publish
